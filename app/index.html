<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvalForge Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        .loader { border-top-color: #3B82F6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-8">
        
        <div class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 p-8 text-white text-center rounded-2xl shadow-xl relative overflow-hidden">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-32 bg-blue-500 rounded-full blur-3xl opacity-20"></div>
            <div class="flex justify-center mb-4 relative z-10">
                <svg class="w-16 h-16 drop-shadow-xl" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="forgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3B82F6" /><stop offset="100%" stop-color="#1E3A8A" />
                        </linearGradient>
                        <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FCD34D" /><stop offset="100%" stop-color="#F59E0B" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="4" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <path d="M50 5 L89 27.5 L89 72.5 L50 95 L11 72.5 L11 27.5 Z" fill="url(#forgeGradient)" stroke="#93C5FD" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M50 20 L50 80 M28 33 L72 67 M28 67 L72 33" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4" class="opacity-50"/>
                    <circle cx="50" cy="50" r="12" fill="url(#sparkGradient)" stroke="#ffffff" stroke-width="2" filter="url(#glow)" class="animate-pulse"/>
                    <circle cx="50" cy="20" r="4" fill="#ffffff" /><circle cx="50" cy="80" r="4" fill="#ffffff" />
                    <circle cx="28" cy="33" r="4" fill="#ffffff" /><circle cx="72" cy="67" r="4" fill="#ffffff" />
                    <circle cx="28" cy="67" r="4" fill="#ffffff" /><circle cx="72" cy="33" r="4" fill="#ffffff" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight relative z-10">Eval<span class="text-blue-400">Forge</span></h1>
            <p class="text-slate-300 mt-2 text-sm font-medium tracking-wide relative z-10">Adaptive RAG & Agentic Evaluation</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><i data-lucide="database" class="w-5 h-5 mr-2 text-blue-600"></i> 1. Ingest Knowledge</h2>
                <form id="uploadForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Project ID</label>
                        <input type="text" id="uploadProjectId" placeholder="e.g., project-alpha" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Upload PDF</label>
                        <input type="file" id="fileUpload" accept=".pdf" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-300 rounded-lg p-1">
                    </div>
                    <button type="submit" id="submitUploadBtn" class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors flex justify-center items-center">
                        <span id="uploadBtnText">Process & Embed PDF</span>
                    </button>
                </form>
                <div id="uploadStatus" class="mt-4 hidden p-3 rounded-lg text-sm text-center"></div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><i data-lucide="message-square" class="w-5 h-5 mr-2 text-green-600"></i> 2. Query the Agent</h2>
                <form id="queryForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Target Project ID</label>
                        <input type="text" id="queryProjectId" placeholder="e.g., project-alpha" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Your Question</label>
                        <textarea id="questionInput" rows="2" placeholder="Ask about the document, or ask for a calculation..." required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></textarea>
                    </div>
                    <button type="submit" id="submitQueryBtn" class="w-full py-2.5 px-4 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition-colors flex justify-center items-center">
                        <span id="queryBtnText">Ask Agent</span>
                    </button>
                </form>
            </div>
        </div>

        <div id="responseContainer" class="hidden bg-white rounded-2xl shadow-lg border border-gray-100 p-6">
            <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Agent Response</h3>
            
            <div class="flex gap-4 mb-4">
                <span id="routeBadge" class="px-3 py-1 bg-purple-100 text-purple-800 rounded-full text-xs font-bold border border-purple-200">Route: RAG_LOOP</span>
                <span id="attemptsBadge" class="px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-xs font-bold border border-amber-200">Attempts: 1</span>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 text-gray-800 mb-4 whitespace-pre-wrap" id="answerText"></div>
            
            <div id="judgeFeedbackContainer" class="hidden">
                <h4 class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-wide">Judge Feedback History</h4>
                <div id="judgeFeedbackList" class="space-y-2 text-sm"></div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // Ingestion Handler
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitUploadBtn');
            const status = document.getElementById('uploadStatus');
            const file = document.getElementById('fileUpload').files[0];
            const projectId = document.getElementById('uploadProjectId').value;
            
            btn.disabled = true; btn.innerHTML = 'Processing...';
            status.className = 'mt-4 hidden p-3 rounded-lg text-sm text-center';

            const formData = new FormData();
            formData.append('project_id', projectId);
            formData.append('file', file);

            try {
                const res = await fetch('http://127.0.0.1:8000/api/v1/documents/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    status.classList.remove('hidden'); status.classList.add('bg-green-50', 'text-green-800');
                    status.innerHTML = `Success! Embedded ${data.chunks_created} vectors.`;
                    // Auto-fill the query project ID
                    document.getElementById('queryProjectId').value = projectId;
                } else throw new Error(data.detail);
            } catch (err) {
                status.classList.remove('hidden'); status.classList.add('bg-red-50', 'text-red-800');
                status.innerHTML = `Error: ${err.message}`;
            } finally {
                btn.disabled = false; btn.innerHTML = 'Process & Embed PDF';
            }
        });

        // Query Handler
        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitQueryBtn');
            const projectId = document.getElementById('queryProjectId').value;
            const question = document.getElementById('questionInput').value;
            const responseContainer = document.getElementById('responseContainer');
            
            btn.disabled = true; btn.innerHTML = 'Agent is thinking...';
            responseContainer.classList.add('hidden');

            try {
                const res = await fetch('http://127.0.0.1:8000/api/v1/query/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_id: projectId, question: question })
                });
                
                const data = await res.json();
                if (res.ok) {
                    responseContainer.classList.remove('hidden');
                    document.getElementById('answerText').textContent = data.answer;
                    document.getElementById('routeBadge').textContent = `Route: ${data.route_taken}`;
                    document.getElementById('attemptsBadge').textContent = `Student Attempts: ${data.student_attempts}`;
                    
                    const feedbackContainer = document.getElementById('judgeFeedbackContainer');
                    const feedbackList = document.getElementById('judgeFeedbackList');
                    feedbackList.innerHTML = '';
                    
                    if (data.judge_feedback && data.judge_feedback.length > 0) {
                        feedbackContainer.classList.remove('hidden');
                        data.judge_feedback.forEach((fb, idx) => {
                            feedbackList.innerHTML += `<div class="p-3 bg-red-50 border border-red-100 rounded text-red-800">
                                <strong>Attempt ${idx + 1} Rejected:</strong> ${fb.feedback}
                            </div>`;
                        });
                    } else {
                        feedbackContainer.classList.add('hidden');
                    }
                } else throw new Error(data.detail[0]?.msg || data.detail);
            } catch (err) {
                alert(`Query Failed: ${err.message}`);
            } finally {
                btn.disabled = false; btn.innerHTML = 'Ask Agent';
            }
        });
    </script>
</body>
</html>
